<!DOCTYPE html>
<html>
<head>
    <title>Fun Facts Generator</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
            background: #0f172a;
            color: white;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background: #22c55e;
            border: none;
            color: white;
            cursor: pointer;
        }
        #fact {
            margin-top: 20px;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <h1>🤖 Random Fun Facts</h1>
    <button onclick="generateFact()">Show Fact</button>
    <p id="fact"></p>

    <script>
        const facts = [
            "Honey never spoils 🍯",
            "Bananas are berries 🍌",
            "Sharks existed before trees 🦈",
            "Octopus has 3 hearts ❤️",
            "The moon has moonquakes 🌙"
        ];

        function generateFact() {
            const randomIndex = Math.floor(Math.random() * facts.length);
            document.getElementById("fact").innerText = facts[randomIndex];
        }
    </script>

</body>
</html>
